<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<meta name="theme-color" content="#0d0d0f">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Вотчлист">
<link rel="manifest" href="manifest.json">
<link rel="apple-touch-icon" href="icons/icon-192.png">
<title>Мой Вотчлист</title>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=DM+Sans:ital,wght@0,300;0,400;0,500;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #0d0d0f;
    --surface: #16161a;
    --surface2: #1e1e24;
    --border: #2a2a32;
    --accent: #e8c547;
    --accent2: #e05c5c;
    --accent3: #5ce0b8;
    --text: #f0eff5;
    --muted: #6b6a75;
    --safe-top: env(safe-area-inset-top, 0px);
    --safe-bottom: env(safe-area-inset-bottom, 0px);
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'DM Sans', sans-serif;
    min-height: 100vh;
    min-height: 100dvh;
    background-image: radial-gradient(ellipse at 20% 20%, #1a1a2e 0%, transparent 60%),
                      radial-gradient(ellipse at 80% 80%, #1a0f0f 0%, transparent 60%);
    padding-bottom: calc(80px + var(--safe-bottom));
  }

  header {
    padding: calc(12px + var(--safe-top)) 16px 0;
    display: flex; align-items: center; justify-content: space-between; gap: 8px;
  }

  h1 { font-family: 'Bebas Neue', sans-serif; font-size: 36px; line-height: 1; letter-spacing: 2px; }
  h1 span { color: var(--accent); }

  .add-btn-header {
    background: var(--accent); color: #0d0d0f; border: none;
    width: 40px; height: 40px; border-radius: 12px; cursor: pointer;
    font-size: 22px; display: flex; align-items: center; justify-content: center;
    flex-shrink: 0; transition: all 0.2s;
  }
  .add-btn-header:active { transform: scale(0.93); }

  .stats-row { display: flex; gap: 8px; padding: 12px 16px 0; flex-wrap: wrap; }

  .stat {
    background: var(--surface); border: 1px solid var(--border); border-radius: 10px;
    padding: 6px 12px; display: flex; align-items: center; gap: 6px;
    font-size: 12px; color: var(--muted); white-space: nowrap;
  }
  .stat strong { font-family: 'Bebas Neue', sans-serif; font-size: 18px; color: var(--text); letter-spacing: 1px; }

  .controls { padding: 10px 16px 0; display: flex; flex-direction: column; gap: 8px; }

  .filter-group {
    display: flex; gap: 4px; background: var(--surface); border: 1px solid var(--border);
    border-radius: 10px; padding: 3px;
  }
  .filter-group::-webkit-scrollbar { display: none; }

  .filter-btn {
    background: none; border: none; color: var(--muted); padding: 6px 0;
    border-radius: 7px; cursor: pointer; font-family: 'DM Sans', sans-serif;
    font-size: 12px; font-weight: 500; transition: all 0.2s; white-space: nowrap;
    flex: 1; text-align: center;
  }
  .filter-btn.active { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }

  .grid { padding: 12px 16px 0; display: flex; flex-direction: column; gap: 10px; }

  .card {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 16px; overflow: hidden; display: flex; flex-direction: row;
    animation: fadeIn 0.3s ease; position: relative;
  }

  .card-poster {
    width: 76px; flex-shrink: 0; background: var(--surface2);
    display: flex; align-items: center; justify-content: center;
    color: var(--border); font-size: 26px; position: relative; overflow: hidden;
    min-height: 110px;
  }
  .card-poster img { width: 100%; height: 100%; object-fit: cover; display: block; position: absolute; inset: 0; }
  .card-poster::after { content: ''; position: absolute; top: 0; left: 0; right: 0; height: 3px; }
  .card.film .card-poster::after { background: var(--accent); }
  .card.series .card-poster::after { background: var(--accent3); }
  .card.anime .card-poster::after { background: var(--accent2); }

  .card-body { flex: 1; padding: 12px 14px; display: flex; flex-direction: column; gap: 8px; min-width: 0; }

  .card-header { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; }
  .card-title-wrap { flex: 1; min-width: 0; }
  .card-title { font-size: 14px; font-weight: 500; line-height: 1.3; }
  .card-year { font-size: 11px; color: var(--muted); margin-top: 2px; }
  .card-actions { display: flex; gap: 2px; flex-shrink: 0; }

  .icon-btn {
    background: none; border: none; cursor: pointer; color: var(--muted);
    padding: 5px; border-radius: 7px; transition: all 0.2s; font-size: 14px; line-height: 1;
  }
  .icon-btn:active { transform: scale(0.85); }

  .card-tags { display: flex; gap: 5px; flex-wrap: wrap; }

  .tag {
    font-size: 10px; font-weight: 500; padding: 2px 8px; border-radius: 5px;
    letter-spacing: 0.5px; text-transform: uppercase;
  }
  .tag.type-film { background: #e8c54720; color: var(--accent); border: 1px solid #e8c54740; }
  .tag.type-series { background: #5ce0b820; color: var(--accent3); border: 1px solid #5ce0b840; }
  .tag.type-anime { background: #e05c5c20; color: var(--accent2); border: 1px solid #e05c5c40; }
  .tag.genre { background: var(--surface2); color: var(--muted); border: 1px solid var(--border); }
  .tag.status-watched { background: #5ce0b815; color: var(--accent3); border: 1px solid #5ce0b830; }
  .tag.status-want { background: #e8c54715; color: var(--accent); border: 1px solid #e8c54730; }
  .tag.rating { background: #e8c54715; color: var(--accent); border: 1px solid #e8c54730; }

  .card-note {
    font-size: 12px; color: var(--muted); font-style: italic; font-weight: 300;
    line-height: 1.4; border-left: 2px solid var(--border); padding-left: 8px;
  }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  /* MODAL */
  .modal-overlay {
    display: none; position: fixed; inset: 0;
    background: rgba(0,0,0,0.75); backdrop-filter: blur(4px);
    z-index: 100; align-items: flex-end; justify-content: center;
  }
  .modal-overlay.open { display: flex; }

  .modal {
    background: var(--surface); border: 1px solid var(--border);
    border-radius: 24px 24px 0 0;
    padding: 20px 16px calc(20px + var(--safe-bottom));
    width: 100%; max-width: 600px; display: flex; flex-direction: column; gap: 16px;
    animation: slideUp 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
    max-height: 92dvh; overflow-y: auto;
  }

  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }

  .modal-handle { width: 40px; height: 4px; background: var(--border); border-radius: 2px; margin: 0 auto -8px; }
  .modal h2 { font-family: 'Bebas Neue', sans-serif; font-size: 28px; letter-spacing: 1px; }

  .form-group { display: flex; flex-direction: column; gap: 6px; }

  .form-group label {
    font-size: 11px; font-weight: 500; color: var(--muted);
    text-transform: uppercase; letter-spacing: 0.8px;
  }

  .search-wrap { position: relative; }

  .form-group input,
  .form-group textarea {
    background: var(--surface2); border: 1px solid var(--border); border-radius: 10px;
    color: var(--text); font-family: 'DM Sans', sans-serif; font-size: 16px;
    padding: 12px 14px; outline: none; transition: border-color 0.2s; resize: none;
    -webkit-appearance: none; width: 100%;
  }
  .form-group input:focus, .form-group textarea:focus { border-color: var(--accent); }

  .search-spinner {
    position: absolute; right: 12px; top: 50%; transform: translateY(-50%);
    width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--accent);
    border-radius: 50%; animation: spin 0.7s linear infinite; display: none;
  }
  .search-spinner.show { display: block; }
  @keyframes spin { to { transform: translateY(-50%) rotate(360deg); } }

  .tmdb-results {
    background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; overflow: hidden; display: none; flex-direction: column;
    max-height: 280px; overflow-y: auto;
  }
  .tmdb-results.show { display: flex; }

  .tmdb-item {
    display: flex; gap: 10px; padding: 10px 12px; cursor: pointer;
    transition: background 0.15s; border-bottom: 1px solid var(--border);
  }
  .tmdb-item:last-child { border-bottom: none; }
  .tmdb-item:active { background: var(--surface); }

  .tmdb-thumb { width: 36px; height: 52px; border-radius: 6px; background: var(--border); flex-shrink: 0; object-fit: cover; display: block; }
  .tmdb-thumb-placeholder { width: 36px; height: 52px; border-radius: 6px; background: var(--border); flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 16px; }
  .tmdb-info { flex: 1; min-width: 0; display: flex; flex-direction: column; justify-content: center; gap: 3px; }
  .tmdb-name { font-size: 13px; font-weight: 500; line-height: 1.3; }
  .tmdb-meta { font-size: 11px; color: var(--muted); }

  .tmdb-selected {
    display: none; flex-direction: row; gap: 12px;
    background: var(--surface2); border: 1px solid var(--accent);
    border-radius: 12px; padding: 12px; align-items: flex-start;
  }
  .tmdb-selected.show { display: flex; }
  .tmdb-selected img { width: 48px; height: 70px; border-radius: 8px; object-fit: cover; flex-shrink: 0; }
  .tmdb-selected-info { flex: 1; display: flex; flex-direction: column; gap: 4px; }
  .tmdb-selected-title { font-size: 14px; font-weight: 500; }
  .tmdb-selected-meta { font-size: 12px; color: var(--muted); }
  .tmdb-clear { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 16px; padding: 2px; flex-shrink: 0; }

  .radio-group { display: flex; gap: 8px; }
  .radio-btn {
    flex: 1; background: var(--surface2); border: 1px solid var(--border);
    border-radius: 10px; padding: 10px 6px; cursor: pointer;
    text-align: center; font-size: 12px; font-weight: 500; color: var(--muted); transition: all 0.2s;
  }
  .radio-btn.selected { background: var(--surface); color: var(--text); border-color: var(--accent); }

  .modal-actions { display: flex; gap: 10px; margin-top: 4px; }
  .btn-cancel {
    flex: 1; background: var(--surface2); border: 1px solid var(--border); color: var(--muted);
    padding: 14px; border-radius: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 15px;
  }
  .btn-save {
    flex: 2; background: var(--accent); border: none; color: #0d0d0f;
    padding: 14px; border-radius: 12px; cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 15px; font-weight: 500;
  }
  .btn-save:active { transform: scale(0.97); }

  .empty { text-align: center; padding: 60px 20px; color: var(--muted); font-weight: 300; }
  .empty .big { font-family: 'Bebas Neue', sans-serif; font-size: 48px; color: #2a2a32; letter-spacing: 2px; }

  .install-banner {
    display: none; margin: 12px 20px 0; background: var(--surface); border: 1px solid var(--accent);
    border-radius: 12px; padding: 12px 16px; align-items: center; gap: 12px; font-size: 13px;
  }
  .install-banner.show { display: flex; }
  .install-banner span { flex: 1; color: var(--muted); }
  .install-banner strong { color: var(--text); }
  .btn-install {
    background: var(--accent); color: #0d0d0f; border: none; padding: 8px 14px; border-radius: 8px;
    cursor: pointer; font-family: 'DM Sans', sans-serif; font-size: 13px; font-weight: 500; white-space: nowrap;
  }
  .btn-dismiss { background: none; border: none; color: var(--muted); cursor: pointer; font-size: 18px; padding: 4px; }

  .label-hint { color: var(--muted); font-size: 10px; text-transform: none; font-weight: 400; }
</style>
</head>
<body>

<header>
  <h1>МОЙ<br><span>ВОТЧЛИСТ</span></h1>
  <button class="add-btn-header" onclick="openModal()">+</button>
</header>

<div class="install-banner" id="installBanner">
  <span>📲 <strong>Установи как приложение</strong> — работает офлайн!</span>
  <button class="btn-install" id="installBtn">Установить</button>
  <button class="btn-dismiss" onclick="dismissInstall()">✕</button>
</div>

<div class="stats-row" id="statsRow"></div>

<div class="controls">
  <div class="filter-group" id="typeFilter">
    <button class="filter-btn active" data-type="all">Все</button>
    <button class="filter-btn" data-type="film">🎬 Фильмы</button>
    <button class="filter-btn" data-type="series">📺 Сериалы</button>
    <button class="filter-btn" data-type="anime">✨ Аниме</button>
  </div>
  <div class="filter-group" id="statusFilter">
    <button class="filter-btn active" data-status="all">Все</button>
    <button class="filter-btn" data-status="want">👀 Хочу</button>
    <button class="filter-btn" data-status="watched">✅ Посмотрел</button>
  </div>
</div>

<div class="grid" id="grid"></div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h2 id="modalTitle">ДОБАВИТЬ</h2>

    <div class="form-group" id="tmdbSearchGroup">
      <label>Поиск <span class="label-hint">— начни вводить название</span></label>
      <div class="search-wrap">
        <input type="text" id="tmdbSearch" placeholder="Например: Интерстеллар..." autocomplete="off">
        <div class="search-spinner" id="searchSpinner"></div>
      </div>
      <div class="tmdb-results" id="tmdbResults"></div>
    </div>

    <div class="tmdb-selected" id="tmdbSelected">
      <img id="tmdbSelectedPoster" src="" alt="">
      <div class="tmdb-selected-info">
        <div class="tmdb-selected-title" id="tmdbSelectedTitle"></div>
        <div class="tmdb-selected-meta" id="tmdbSelectedMeta"></div>
      </div>
      <button class="tmdb-clear" onclick="clearTmdb()">✕</button>
    </div>

    <div class="form-group">
      <label>Название <span class="label-hint">— или введи вручную</span></label>
      <input type="text" id="inputTitle" placeholder="Название...">
    </div>

    <div class="form-group">
      <label>Тип</label>
      <div class="radio-group" id="typeRadio">
        <div class="radio-btn selected" data-val="film">🎬 Фильм</div>
        <div class="radio-btn" data-val="series">📺 Сериал</div>
        <div class="radio-btn" data-val="anime">✨ Аниме</div>
      </div>
    </div>

    <div class="form-group">
      <label>Статус</label>
      <div class="radio-group" id="statusRadio">
        <div class="radio-btn selected" data-val="want">👀 Хочу посмотреть</div>
        <div class="radio-btn" data-val="watched">✅ Посмотрел</div>
      </div>
    </div>

    <div class="form-group">
      <label>Жанр <span class="label-hint">— заполняется автоматически</span></label>
      <input type="text" id="inputGenre" placeholder="Триллер, Комедия...">
    </div>

    <div class="form-group">
      <label>Заметка</label>
      <textarea id="inputNote" rows="2" placeholder="Кто посоветовал, где смотреть..."></textarea>
    </div>

    <div class="modal-actions">
      <button class="btn-cancel" onclick="closeModal()">Отмена</button>
      <button class="btn-save" onclick="saveItem()">Сохранить</button>
    </div>
  </div>
</div>

<script>
  const TMDB_TOKEN = 'eyJhbGciOiJIUzI1NiJ9.eyJhdWQiOiI0NGUyNmVhMmY4OGJkODI2NGQ1NzBjY2VkMmU0Zjk1NSIsIm5iZiI6MTc3Mjc1MTU0Ny40NTI5OTk4LCJzdWIiOiI2OWFhMGFiYmRhMDgwM2JmZjlhYzFmMDYiLCJzY29wZXMiOlsiYXBpX3JlYWQiXSwidmVyc2lvbiI6MX0.U8Qbu5Jv4z0jiZWvY3b95I4f2_jUj98c-unkjPIV1V8';
  const TMDB_BASE = 'https://api.themoviedb.org/3';
  const TMDB_IMG_SM = 'https://image.tmdb.org/t/p/w185';
  const TMDB_IMG_MD = 'https://image.tmdb.org/t/p/w342';

  const GENRE_MAP = {
    28:'Боевик',12:'Приключения',16:'Анимация',35:'Комедия',80:'Криминал',
    99:'Документальный',18:'Драма',10751:'Семейный',14:'Фэнтези',36:'История',
    27:'Ужасы',10402:'Музыка',9648:'Детектив',10749:'Романтика',878:'Фантастика',
    10770:'ТВ-фильм',53:'Триллер',10752:'Война',37:'Вестерн',
    10759:'Экшн',10762:'Детский',10765:'Sci-Fi',10768:'Война/Политика',
  };

  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => navigator.serviceWorker.register('./service-worker.js'));
  }

  let deferredPrompt;
  window.addEventListener('beforeinstallprompt', (e) => {
    e.preventDefault(); deferredPrompt = e;
    if (!localStorage.getItem('installDismissed'))
      document.getElementById('installBanner').classList.add('show');
  });
  document.getElementById('installBtn').addEventListener('click', async () => {
    if (!deferredPrompt) return;
    deferredPrompt.prompt(); await deferredPrompt.userChoice;
    deferredPrompt = null;
    document.getElementById('installBanner').classList.remove('show');
  });
  function dismissInstall() {
    document.getElementById('installBanner').classList.remove('show');
    localStorage.setItem('installDismissed', '1');
  }

  const STORAGE_KEY = 'watchlist_v1';
  let items = JSON.parse(localStorage.getItem(STORAGE_KEY) || '[]');
  let editId = null, filterType = 'all', filterStatus = 'all';
  let tmdbData = null, searchTimer = null;

  const typeLabels = { film: '🎬 Фильм', series: '📺 Сериал', anime: '✨ Аниме' };
  const statusLabels = { want: 'Хочу посмотреть', watched: 'Посмотрел' };

  function save() { localStorage.setItem(STORAGE_KEY, JSON.stringify(items)); }

  function esc(s) {
    return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
  }

  function render() {
    const grid = document.getElementById('grid');
    const filtered = items.filter(i =>
      (filterType === 'all' || i.type === filterType) &&
      (filterStatus === 'all' || i.status === filterStatus)
    );

    grid.innerHTML = filtered.length ? filtered.map(item => `
      <div class="card ${esc(item.type)}">
        <div class="card-poster">
          ${item.poster ? `<img src="${esc(item.poster)}" alt="" loading="lazy">` : (item.type==='film'?'🎬':item.type==='series'?'📺':'✨')}
        </div>
        <div class="card-body">
          <div class="card-header">
            <div class="card-title-wrap">
              <div class="card-title">${esc(item.title)}</div>
              ${item.year ? `<div class="card-year">${esc(item.year)}</div>` : ''}
            </div>
            <div class="card-actions">
              <button class="icon-btn" onclick="toggleStatus('${item.id}')">${item.status==='watched'?'👀':'✅'}</button>
              <button class="icon-btn" onclick="editItem('${item.id}')">✏️</button>
              <button class="icon-btn" onclick="deleteItem('${item.id}')">✕</button>
            </div>
          </div>
          <div class="card-tags">
            <span class="tag type-${esc(item.type)}">${typeLabels[item.type]}</span>
            <span class="tag ${item.status==='watched'?'status-watched':'status-want'}">${statusLabels[item.status]}</span>
            ${item.rating ? `<span class="tag rating">⭐ ${esc(item.rating)}</span>` : ''}
            ${item.genre ? `<span class="tag genre">${esc(item.genre)}</span>` : ''}
          </div>
          ${item.note ? `<div class="card-note">${esc(item.note)}</div>` : ''}
        </div>
      </div>
    `).join('') : '<div class="empty"><div class="big">ПУСТО</div><div>Нажми + чтобы добавить</div></div>';

    const total = items.length;
    const watched = items.filter(i => i.status==='watched').length;
    const counts = { film: 0, series: 0, anime: 0 };
    items.forEach(i => counts[i.type]++);

    document.getElementById('statsRow').innerHTML = [
      `<div class="stat"><strong>${total}</strong> всего</div>`,
      `<div class="stat"><strong>${watched}</strong> просмотрено</div>`,
      `<div class="stat"><strong>${total - watched}</strong> в очереди</div>`,
      counts.film ? `<div class="stat"><strong>${counts.film}</strong> фильмов</div>` : '',
      counts.series ? `<div class="stat"><strong>${counts.series}</strong> сериалов</div>` : '',
      counts.anime ? `<div class="stat"><strong>${counts.anime}</strong> аниме</div>` : '',
    ].join('');
  }

  // --- TMDB ---
  async function searchTmdb(query) {
    if (!query || query.length < 2) {
      document.getElementById('tmdbResults').classList.remove('show'); return;
    }
    document.getElementById('searchSpinner').classList.add('show');
    try {
      const headers = { Authorization: `Bearer ${TMDB_TOKEN}` };
      const [mRes, tRes] = await Promise.all([
        fetch(`${TMDB_BASE}/search/movie?query=${encodeURIComponent(query)}&language=ru-RU`, { headers }),
        fetch(`${TMDB_BASE}/search/tv?query=${encodeURIComponent(query)}&language=ru-RU`, { headers }),
      ]);
      const [mData, tData] = await Promise.all([mRes.json(), tRes.json()]);
      const results = [
        ...(mData.results||[]).slice(0,4).map(r=>({...r,_kind:'movie'})),
        ...(tData.results||[]).slice(0,3).map(r=>({...r,_kind:'tv'})),
      ].sort((a,b)=>(b.popularity||0)-(a.popularity||0)).slice(0,6);
      renderResults(results);
    } catch(e) {
      document.getElementById('tmdbResults').classList.remove('show');
    }
    document.getElementById('searchSpinner').classList.remove('show');
  }

  function renderResults(results) {
    const el = document.getElementById('tmdbResults');
    if (!results.length) { el.classList.remove('show'); return; }
    el._data = results;
    el.innerHTML = results.map((r, i) => {
      const title = r.title || r.name || '';
      const year = (r.release_date || r.first_air_date || '').slice(0,4);
      const rating = r.vote_average ? r.vote_average.toFixed(1) : '';
      const kind = r._kind === 'movie' ? '🎬' : '📺';
      const thumb = r.poster_path
        ? `<img class="tmdb-thumb" src="${TMDB_IMG_SM}${r.poster_path}" alt="">`
        : `<div class="tmdb-thumb-placeholder">${kind}</div>`;
      return `<div class="tmdb-item" onclick="selectTmdb(${i})">
        ${thumb}
        <div class="tmdb-info">
          <div class="tmdb-name">${esc(title)}</div>
          <div class="tmdb-meta">${kind} ${year}${rating?' · ⭐ '+rating:''}</div>
        </div>
      </div>`;
    }).join('');
    el.classList.add('show');
  }

  function selectTmdb(idx) {
    const r = document.getElementById('tmdbResults')._data?.[idx];
    if (!r) return;
    const title = r.title || r.name || '';
    const year = (r.release_date || r.first_air_date || '').slice(0,4);
    const rating = r.vote_average ? r.vote_average.toFixed(1) : '';
    const genres = (r.genre_ids||[]).map(id=>GENRE_MAP[id]).filter(Boolean).slice(0,3).join(', ');
    const poster = r.poster_path ? `${TMDB_IMG_MD}${r.poster_path}` : '';
    const isAnime = r._kind === 'tv' && (r.genre_ids||[]).includes(16);
    const type = isAnime ? 'anime' : r._kind === 'movie' ? 'film' : 'series';

    tmdbData = { title, year, rating, genres, poster, type, tmdbId: r.id };

    document.getElementById('inputTitle').value = title;
    document.getElementById('inputGenre').value = genres;
    setRadio('typeRadio', type);

    const posterEl = document.getElementById('tmdbSelectedPoster');
    posterEl.src = poster; posterEl.style.display = poster ? 'block' : 'none';
    document.getElementById('tmdbSelectedTitle').textContent = title;
    document.getElementById('tmdbSelectedMeta').textContent = [year, rating?'⭐ '+rating:''].filter(Boolean).join(' · ');
    document.getElementById('tmdbSelected').classList.add('show');
    document.getElementById('tmdbResults').classList.remove('show');
    document.getElementById('tmdbSearch').value = '';
  }

  function clearTmdb() {
    tmdbData = null;
    document.getElementById('tmdbSelected').classList.remove('show');
    document.getElementById('inputTitle').value = '';
    document.getElementById('inputGenre').value = '';
    document.getElementById('tmdbSearch').value = '';
    setRadio('typeRadio', 'film');
  }

  document.getElementById('tmdbSearch').addEventListener('input', e => {
    clearTimeout(searchTimer);
    const q = e.target.value.trim();
    if (!q) { document.getElementById('tmdbResults').classList.remove('show'); return; }
    searchTimer = setTimeout(() => searchTmdb(q), 420);
  });

  // --- Modal ---
  function openModal(id = null) {
    editId = id; tmdbData = null;
    document.getElementById('modalOverlay').classList.add('open');
    document.getElementById('modalTitle').textContent = id ? 'РЕДАКТИРОВАТЬ' : 'ДОБАВИТЬ';
    document.getElementById('tmdbSelected').classList.remove('show');
    document.getElementById('tmdbResults').classList.remove('show');
    document.getElementById('tmdbSearch').value = '';
    document.getElementById('tmdbSearchGroup').style.display = id ? 'none' : 'flex';

    if (id) {
      const item = items.find(i => i.id === id);
      document.getElementById('inputTitle').value = item.title;
      document.getElementById('inputGenre').value = item.genre || '';
      document.getElementById('inputNote').value = item.note || '';
      setRadio('typeRadio', item.type);
      setRadio('statusRadio', item.status);
    } else {
      document.getElementById('inputTitle').value = '';
      document.getElementById('inputGenre').value = '';
      document.getElementById('inputNote').value = '';
      setRadio('typeRadio', 'film');
      setRadio('statusRadio', 'want');
      setTimeout(() => document.getElementById('tmdbSearch').focus(), 350);
    }
  }

  function closeModal() {
    document.getElementById('modalOverlay').classList.remove('open');
    editId = null; tmdbData = null;
  }

  function setRadio(groupId, val) {
    document.querySelectorAll(`#${groupId} .radio-btn`).forEach(b =>
      b.classList.toggle('selected', b.dataset.val === val));
  }
  function getRadio(groupId) {
    return document.querySelector(`#${groupId} .radio-btn.selected`)?.dataset.val;
  }

  function saveItem() {
    const title = document.getElementById('inputTitle').value.trim();
    if (!title) { document.getElementById('inputTitle').focus(); return; }
    const existing = editId ? items.find(i => i.id === editId) : {};
    const data = {
      title,
      type: getRadio('typeRadio'),
      status: getRadio('statusRadio'),
      genre: document.getElementById('inputGenre').value.trim(),
      note: document.getElementById('inputNote').value.trim(),
      poster: tmdbData?.poster || existing?.poster || '',
      year: tmdbData?.year || existing?.year || '',
      rating: tmdbData?.rating || existing?.rating || '',
      tmdbId: tmdbData?.tmdbId || existing?.tmdbId || '',
    };
    if (editId) {
      const idx = items.findIndex(i => i.id === editId);
      items[idx] = { ...items[idx], ...data };
    } else {
      items.unshift({ id: Date.now().toString(), ...data });
    }
    save(); render(); closeModal();
  }

  function deleteItem(id) { items = items.filter(i => i.id !== id); save(); render(); }
  function editItem(id) { openModal(id); }
  function toggleStatus(id) {
    const item = items.find(i => i.id === id);
    item.status = item.status === 'watched' ? 'want' : 'watched';
    save(); render();
  }

  document.getElementById('typeFilter').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn'); if (!btn) return;
    document.querySelectorAll('#typeFilter .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); filterType = btn.dataset.type; render();
  });
  document.getElementById('statusFilter').addEventListener('click', e => {
    const btn = e.target.closest('.filter-btn'); if (!btn) return;
    document.querySelectorAll('#statusFilter .filter-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active'); filterStatus = btn.dataset.status; render();
  });
  document.getElementById('typeRadio').addEventListener('click', e => {
    const btn = e.target.closest('.radio-btn'); if (btn) setRadio('typeRadio', btn.dataset.val);
  });
  document.getElementById('statusRadio').addEventListener('click', e => {
    const btn = e.target.closest('.radio-btn'); if (btn) setRadio('statusRadio', btn.dataset.val);
  });
  document.getElementById('modalOverlay').addEventListener('click', e => {
    if (e.target === document.getElementById('modalOverlay')) closeModal();
  });
  document.addEventListener('keydown', e => { if (e.key === 'Escape') closeModal(); });

  render();
</script>
</body>
</html>
